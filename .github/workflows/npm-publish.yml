name: Node.js Package

on:
  release:
    types: [created]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11"

      - run: pnpm i

      - run: npm publish
